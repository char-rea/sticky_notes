<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
      <title>Shopping World!</title>

<!-- Bootstrap CSS -->
    <style>
        body {
            background-color: #eec5da;
        }

        .card-img-top {
    transition: transform 0.3s;
        }

        .card-img-top:hover {
        transform: scale(1.1);
        }

        .card {
        overflow: hidden;
        }

        footer {
            background-color: #343a40;
            color: white;
            padding: 30px;
            margin-top: 40px;
        }

        .logo {
            width: 80px;
            margin-right: 20px;
        }
    </style>
</head>

<!-- Body -->
<body>

    <div class="container mt-4">
        <h1 class="text-center mb-4">Online Shopping Store</h1>

        <div class="row">

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="dress.jpg" class="card-img-top img-fluid" alt="Dress">
                    <div class="card-body text-center">
                        <h5 class="card-title">Dress</h5>
                        <p>$19.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="shirt.jpg" class="card-img-top img-fluid" alt="Shirt">
                    <div class="card-body text-center">
                        <h5 class="card-title">Shirt</h5>
                        <p>$29.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="pants.jpg" class="card-img-top img-fluid" alt="Pants">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pants</h5>
                        <p>$39.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>  

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="necklace.jpg" class="card-img-top img-fluid" alt="Necklace">
                    <div class="card-body text-center">
                        <h5 class="card-title">Necklace</h5>
                        <p>$34.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="earrings.jpg" class="card-img-top img-fluid" alt="Earrings">
                    <div class="card-body text-center">
                        <h5 class="card-title">Earrings</h5>
                        <p>$39.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="jacket.jpg" class="card-img-top img-fluid" alt="Jacket">
                    <div class="card-body text-center">
                        <h5 class="card-title">Jacket</h5>
                        <p>$44.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="scarf.jpg" class="card-img-top img-fluid" alt="Scarf">
                    <div class="card-body text-center">
                        <h5 class="card-title">Scarf</h5>
                        <p>$49.99</p>   
                        <button class="btn btn-primary">Buy</button>    
                    </div>
                </div>
            </div>  

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="handbag.jpg" class="card-img-top img-fluid" alt="Handbag">
                    <div class="card-body text-center">
                        <h5 class="card-title">Handbag</h5>
                        <p>$54.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="ring.jpg" class="card-img-top img-fluid" alt="Ring">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ring</h5>
                        <p>$59.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>
    
            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card">
                    <img src="hat.jpg" class="card-img-top img-fluid" alt="Hat">
                    <div class="card-body text-center">
                        <h5 class="card-title">Hat</h5>
                        <p>$64.99</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

        </div>
    </div>


<!-- Footer -->
    <footer>
        <div class="container">
            <div class="d-flex align-items-center">

                <img src="logo.png" alt="Company Logo" class="logo">

                <form class="row g-2 flex-grow-1">
                    <div class="col-md-4">
                        <input type="text" class="form-control" placeholder="Full Name">
                    </div>

                    <div class="col-md-4">
                        <input type="email" class="form-control" placeholder="Email Address">
                    </div>

                    <div class="col-md-3">
                        <input type="tel" class="form-control" placeholder="Phone Number">
                    </div>

                    <div class="col-md-1">
                        <button type="submit" class="btn btn-success w-100">
                            Send
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
