<!DOCTYPE html>
<html>
<head>
    <title>Delete Sticky Note</title>
</head>
<body>
    <h1>Delete Sticky Note</h1>

    <p>Are you sure you want to delete this note?</p>

    <p><strong>{{ note.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'note_list' %}">Cancel</a>
    </form>
</body>
</html>
