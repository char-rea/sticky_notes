{% extends "base.html" %}

{% block title %}
    Bulletin Board - {{ post.title }}
{% endblock title %}

{% block content %}
    <h2>{{ post.title }}</h2>

    <p>{{ post.content }}</p>

    <p>
        <strong>Created at:</strong> {{ post.created_at }}
    </p>

    <p>
        <a href="{% url 'post_update' pk=post.pk %}">Update Post</a> |
        <a href="{% url 'post_delete' pk=post.pk %}">Delete Post</a> |
        <a href="{% url 'post_list' %}">Back to Post List</a>
    </p>
{% endblock content %}
